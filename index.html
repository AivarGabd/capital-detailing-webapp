<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capital Detailing — карта лояльности</title>
  <style>
    :root {
      --tg-theme-bg-color: #ffffff;
      --tg-theme-text-color: #000000;
      --tg-theme-hint-color: #999999;
      --tg-theme-link-color: #2481cc;
      --tg-theme-button-color: #2481cc;
      --tg-theme-button-text-color: #ffffff;
      --tg-theme-secondary-bg-color: #f0f0f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      padding: 16px;
      line-height: 1.5;
    }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }

  p {
    font-size: 14px;
    margin-bottom: 16px;
    text-align: center;
  }

  .qr-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 24px;
  }

  .qr-wrapper img {
    width: 260px;
    height: 260px;
  }

  .hint {
    font-size: 13px;
    color: var(--tg-theme-hint-color);
    text-align: center;
  }
  </style>
</head>
<body>
  <h1>Capital Detailing</h1>
  <p>Отсканируйте QR‑код, чтобы открыть бота и зарегистрироваться в программе лояльности.</p>

  <div class="qr-wrapper">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=https%3A%2F%2Ft.me%2FCapitaldetailing_bot" alt="QR-code to open @Capitaldetailing_bot">
    <div class="hint">Наведите камеру телефона на QR или откройте бота по ссылке: t.me/Capitaldetailing_bot</div>
  </div>
</body>
</html>
